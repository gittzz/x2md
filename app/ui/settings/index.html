<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X2MD 设置</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>X2MD 设置</h1>
    <p id="status">正在连接本地服务…</p>
    <p id="serviceInfo"></p>

    <label class="row">
      <input id="autostart" type="checkbox" />
      开机自动运行
    </label>

    <label>Markdown 保存目录
      <input id="savePath" placeholder="~/Desktop/X2MD/MD" />
    </label>

    <label>自定义保存路径（JSON 数组）
      <textarea id="customSavePaths" rows="4" placeholder='[{"name":"生图类","path":"/你的/Obsidian/子目录"}]'></textarea>
    </label>

    <label>视频保存目录
      <input id="videoPath" placeholder="~/Desktop/X2MD/Videos" />
    </label>

    <label class="row">
      <input id="enableVideoDownload" type="checkbox" />
      启用视频下载
    </label>

    <label class="row">
      <input id="enableSaveNotification" type="checkbox" />
      保存成功后显示系统通知
    </label>

    <label>长视频二次确认阈值（分钟）
      <input id="videoThreshold" type="number" min="1" max="1440" />
    </label>

    <label>服务端口
      <input id="port" type="number" min="1" max="65535" />
    </label>

    <label>文件名格式
      <input id="filenameFormat" placeholder="{summary}_{date}_{author}" />
    </label>

    <label>最长文件名
      <input id="maxFilenameLength" type="number" min="20" max="180" />
    </label>

    <label>博主抓取范围
      <select id="profileRange">
        <option value="today">当日</option>
        <option value="month">当月</option>
        <option value="days">最近 N 天</option>
        <option value="all">全部</option>
      </select>
    </label>

    <label>自定义天数
      <input id="profileCustomDays" type="number" min="1" max="3650" />
    </label>

    <label>博主批量保存根路径（留空使用主保存目录）
      <input id="profileSavePath" />
    </label>

    <label class="row">
      <input id="showSiteSaveIcon" type="checkbox" />
      显示站点保存按钮
    </label>

    <label class="row">
      <input id="showProfileCapture" type="checkbox" />
      显示 X 博主批量抓取按钮
    </label>

    <section class="actions">
      <button id="save">保存设置</button>
      <button id="test">测试服务</button>
      <button id="openSave" type="button">打开保存目录</button>
      <button id="openVideo" type="button">打开视频目录</button>
      <button id="openLog" type="button">打开日志</button>
      <button id="showLog" type="button">查看日志</button>
      <button id="openExtension" type="button">扩展安装说明</button>
    </section>

    <pre id="logView" hidden></pre>

    <section id="extensionHelp" hidden>
      <h2>Chrome 扩展安装</h2>
      <ol>
        <li>打开 <code>chrome://extensions/</code></li>
        <li>开启“开发者模式”</li>
        <li>点击“加载已解压的扩展程序”</li>
        <li>选择本项目或发布包里的 <code>extension</code> / <code>X2MD_Extension</code> 目录</li>
      </ol>
    </section>
  </main>
  <script type="module" src="settings.js"></script>
</body>
</html>
